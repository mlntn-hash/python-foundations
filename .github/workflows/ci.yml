name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Run ruff (lint check)
        run: ruff check 02-csv-stats

      - name: Run test
        working-directory: 02-csv-stats
        run: pytest 02-csv-stats -v